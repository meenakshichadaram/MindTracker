{% extends 'base.html' %}
{% block content %}

<div class="stat-grid">
    <div class="stat-box">
        <h3 id="avg-mood">-</h3>
        <p>Average Mood</p>
    </div>
    <div class="stat-box">
        <h3 id="total-entries">-</h3>
        <p>Total Entries</p>
    </div>
    <div class="stat-box">
        <h3 id="streak">-</h3>
        <p>Day Streak 🔥</p>
    </div>
</div>

<div class="card">
    <h2>Recommendations for you</h2>
    <div id="recommendations">Loading...</div>
</div>

<div class="card">
    <h2>Recent Moods</h2>
    <div id="mood-list">Loading...</div>
</div>

{% endblock %}

{% block scripts %}
<script>
    async function loadDashboard() {
        const analytics = await apiRequest('/api/analytics/summary/');
        if (analytics) {
            document.getElementById('avg-mood').textContent = analytics.avg_mood || '-';
            document.getElementById('total-entries').textContent = analytics.total_entries;
            document.getElementById('streak').textContent = analytics.current_streak;
        }

        const recs = await apiRequest('/api/recommendations/');
        const recDiv = document.getElementById('recommendations');
        if (recs && recs.length > 0) {
            recDiv.innerHTML = recs.map(r => `
                <div class="rec-card">
                    <h4>${r.title}</h4>
                    <p>${r.content}</p>
                    <small style="color:#555575">${r.category} • ${new Date(r.generated_at).toLocaleDateString()}</small>
                </div>
            `).join('');
        } else {
            recDiv.innerHTML = '<p style="color:#555575">No recommendations yet. Log some moods first!</p>';
        }

        const moods = await apiRequest('/api/moods/');
        const moodDiv = document.getElementById('mood-list');
        if (moods && moods.results && moods.results.length > 0) {
            moodDiv.innerHTML = moods.results.map(m => {
                let colorClass = m.score >= 7 ? 'mood-high' : m.score >= 5 ? 'mood-mid' : 'mood-low';
                return `
                    <div class="mood-entry">
                        <span class="mood-score ${colorClass}">${m.score}/10</span>
                        <strong style="margin-left:10px; color:#e0e0e0">${m.note || 'No note'}</strong>
                        <div class="date">${new Date(m.logged_at).toLocaleString()}</div>
                    </div>
                `;
            }).join('');
        } else {
            moodDiv.innerHTML = '<p style="color:#555575">No mood entries yet. <a href="/log/" style="color:#a78bfa">Log your first mood!</a></p>';
        }
    }

    if (!localStorage.getItem('access_token')) {
        window.location.href = '/login/';
    } else {
        loadDashboard();
    }
</script>
{% endblock %}
