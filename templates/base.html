<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        nav {
            background: #1a1a2e;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a4a;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            color: #a0a0c0;
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        nav a:hover { color: #a78bfa; }

        .container {
            max-width: 960px;
            margin: 35px auto;
            padding: 0 24px;
        }

        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
            border: 1px solid #2a2a4a;
        }

        .card h2 {
            font-size: 17px;
            font-weight: 600;
            color: #a78bfa;
            margin-bottom: 18px;
            letter-spacing: 0.3px;
        }

        .btn {
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            color: white;
            border: none;
            padding: 11px 28px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        input, textarea, select {
            width: 100%;
            padding: 11px 14px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            color: #e0e0e0;
            margin-bottom: 14px;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #a78bfa;
        }
        input::placeholder, textarea::placeholder { color: #555575; }

        label {
            font-size: 13px;
            color: #8080a0;
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 500;
        }
        .alert-success { background: #1a3a2a; color: #4ade80; border: 1px solid #2a5a3a; }
        .alert-error { background: #3a1a1a; color: #f87171; border: 1px solid #5a2a2a; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 1px solid #2a2a4a;
            transition: border-color 0.2s;
        }
        .stat-box:hover { border-color: #a78bfa; }
        .stat-box h3 { font-size: 36px; font-weight: 700; color: #a78bfa; }
        .stat-box p { font-size: 12px; color: #6060a0; margin-top: 6px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }

        .mood-score {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
        }
        .mood-high { background: #1a3a2a; color: #4ade80; }
        .mood-mid { background: #3a3a1a; color: #fbbf24; }
        .mood-low { background: #3a1a1a; color: #f87171; }

        .mood-entry {
            border-left: 3px solid #a78bfa;
            padding: 14px 16px;
            margin-bottom: 12px;
            background: #0f0f1a;
            border-radius: 0 10px 10px 0;
            transition: border-color 0.2s;
        }
        .mood-entry:hover { border-color: #60a5fa; }
        .mood-entry .date { font-size: 11px; color: #555575; margin-top: 6px; }

        .rec-card {
            border-left: 3px solid #60a5fa;
            padding: 14px 16px;
            margin-bottom: 12px;
            background: #0f0f1a;
            border-radius: 0 10px 10px 0;
        }
        .rec-card h4 { color: #60a5fa; margin-bottom: 6px; font-size: 15px; }
        .rec-card p { font-size: 13px; color: #8080a0; }

        /* Chart styles */
        .chart-container {
            position: relative;
            width: 100%;
            height: 260px;
            margin-top: 10px;
        }

        .week-card {
            background: #0f0f1a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .week-card .week-label { font-size: 13px; color: #8080a0; }
        .week-card .week-avg { font-size: 22px; font-weight: 700; color: #a78bfa; }
        .week-card .week-trend { font-size: 12px; padding: 3px 10px; border-radius: 20px; }
        .trend-improving { background: #1a3a2a; color: #4ade80; }
        .trend-declining { background: #3a1a1a; color: #f87171; }
        .trend-stable { background: #2a2a3a; color: #a78bfa; }
        .trend-nodata { background: #2a2a2a; color: #555575; }

        /* Auth pages */
        .auth-container {
            max-width: 420px;
            margin: 70px auto;
        }
        .auth-container .card { padding: 36px; }
        .auth-container h2 {
            text-align: center;
            font-size: 22px;
            color: #e0e0e0;
            margin-bottom: 24px;
        }
        .auth-container p {
            text-align: center;
            font-size: 13px;
            color: #6060a0;
            margin-top: 16px;
        }
        .auth-container a { color: #a78bfa; text-decoration: none; }
    </style>
</head>
<body>

<nav>
    <h1>🧠 MindTracker</h1>
    <div>
        <a href="/dashboard/">Dashboard</a>
        <a href="/log/">Log Mood</a>
        <a href="/analytics/">Analytics</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script>
    function logout() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        window.location.href = '/login/';
    }

    async function apiRequest(url, method='GET', data=null) {
        let token = localStorage.getItem('access_token');
        const options = {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            }
        };
        if (data) options.body = JSON.stringify(data);
        const response = await fetch(url, options);
        if (response.status === 401) {
            window.location.href = '/login/';
            return;
        }
        return response.json();
    }
</script>

{% block scripts %}{% endblock %}
</body>
</html>
